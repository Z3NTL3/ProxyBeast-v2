name: List open user PRs
on:
  pull_request:
    types:
      - opened
      - reopened
jobs:
  list-prs:
    name: List open user PRs
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AUTHOR: ${{ github.event.pull_request.user.id }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
    steps:
      - run: |
          gh pr ls -A $AUTHOR -R $REPO >> prs.txt
          gh pr comment $PR_NUMBER  -R $REPO -F prs.txt
